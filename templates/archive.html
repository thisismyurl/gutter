<!-- Archive template for Gutter.
     Category, tag, date, and author archives.
     Extends the index layout with an archive header (title + description)
     above the typographic post list.

     The archive title uses the eyebrow treatment — the category name reads
     as a label above the list, not as a page headline. This matches how
     design publications head their archive pages: "Selected Work / Identity"
     not "Identity Category Archive". -->

<!-- wp:template-part {"slug":"header"} /-->

<!-- wp:group {"tagName":"main","id":"main-content","className":"gutter-main gutter-archive","layout":{"type":"constrained","contentSize":"720px"},"style":{"spacing":{"padding":{"top":"var:preset|spacing|12","bottom":"var:preset|spacing|20","left":"var:preset|spacing|5","right":"var:preset|spacing|5"}}}} -->
<main id="main-content" class="wp-block-group gutter-main gutter-archive" style="padding-top:var(--wp--preset--spacing--12);padding-bottom:var(--wp--preset--spacing--20);padding-left:var(--wp--preset--spacing--5);padding-right:var(--wp--preset--spacing--5)">

	<!-- Archive header: term name in eyebrow style + optional description -->
	<!-- wp:group {"className":"gutter-archive-header","style":{"spacing":{"blockGap":"var:preset|spacing|4","padding":{"bottom":"var:preset|spacing|10"},"margin":{"bottom":"var:preset|spacing|10"}},"border":{"bottom":{"color":"var:preset|color|rule","style":"solid","width":"1px"}}},"layout":{"type":"default"}} -->
	<div class="wp-block-group gutter-archive-header" style="padding-bottom:var(--wp--preset--spacing--10);margin-bottom:var(--wp--preset--spacing--10);border-bottom:1px solid var(--wp--preset--color--rule)">

		<!-- Archive label — displays the taxonomy name or "Archives" -->
		<!-- wp:term-description {"style":{"typography":{"fontFamily":"var:preset|font-family|plex-sans","fontSize":"var:preset|font-size|sm"},"color":{"text":"var:preset|color|ink-muted"}}} /-->

		<!-- wp:query-title {"type":"archive","level":1,"textAlign":"left","style":{"typography":{"fontFamily":"var:preset|font-family|plex-serif","fontWeight":"300","fontSize":"var:preset|font-size|3xl","letterSpacing":"-0.02em","lineHeight":"1.1"},"color":{"text":"var:preset|color|ink-primary"}}} /-->

	</div>
	<!-- /wp:group -->

	<!-- Post list: same typographic index as the front-page research list -->
	<!-- wp:query {"queryId":1,"query":{"perPage":10,"postType":"post","order":"desc","orderBy":"date","inherit":true},"layout":{"type":"default"}} -->
	<div class="wp-block-query">

		<!-- wp:post-template {"layout":{"type":"default"}} -->

			<!-- wp:group {"style":{"spacing":{"blockGap":"var:preset|spacing|3","padding":{"bottom":"var:preset|spacing|10"},"margin":{"bottom":"var:preset|spacing|10"}}},"layout":{"type":"default"},"border":{"bottom":{"color":"var:preset|color|rule","style":"solid","width":"1px"}}} -->
			<div class="wp-block-group" style="padding-bottom:var(--wp--preset--spacing--10);margin-bottom:var(--wp--preset--spacing--10);border-bottom:1px solid var(--wp--preset--color--rule)">
				<!-- wp:template-part {"slug":"post-meta","tagName":"div"} /-->
				<!-- wp:post-title {"isLink":true,"style":{"typography":{"fontFamily":"var:preset|font-family|plex-serif","fontWeight":"400","fontSize":"var:preset|font-size|2xl","letterSpacing":"-0.01em","textDecoration":"none"},"color":{"text":"var:preset|color|ink-primary"}}} /-->
				<!-- post-excerpt without a moreText override: core supplies its own
				     translatable "read more" link text, so no English literal is
				     hardcoded in the template. -->
				<!-- wp:post-excerpt {"style":{"typography":{"fontFamily":"var:preset|font-family|plex-sans","lineHeight":"1.7"},"color":{"text":"var:preset|color|ink-primary"}}} /-->
			</div>
			<!-- /wp:group -->

		<!-- /wp:post-template -->

		<!-- No-results state: the archive h1 (query-title above) names the term
			     and the search form offers a recovery path. No hardcoded English
			     prose; the form label is translatable through core. -->
		<!-- wp:query-no-results -->
			<!-- wp:group {"style":{"spacing":{"padding":{"top":"var:preset|spacing|12","bottom":"var:preset|spacing|12"},"blockGap":"var:preset|spacing|6"}},"layout":{"type":"default"}} -->
			<div class="wp-block-group" style="padding-top:var(--wp--preset--spacing--12);padding-bottom:var(--wp--preset--spacing--12)">
				<!-- wp:search {"label":"Search","buttonText":"Search","buttonUseIcon":true,"style":{"typography":{"fontFamily":"var:preset|font-family|plex-sans"}}} /-->
			</div>
			<!-- /wp:group -->
		<!-- /wp:query-no-results -->

		<!-- wp:query-pagination {"layout":{"type":"flex","justifyContent":"space-between"}} -->
			<!-- wp:query-pagination-previous /-->
			<!-- wp:query-pagination-numbers /-->
			<!-- wp:query-pagination-next /-->
		<!-- /wp:query-pagination -->

	</div>
	<!-- /wp:query -->

</main>
<!-- /wp:group -->
