<!-- Footer template part for Gutter.
     Dark terminal band: ink-deep background, paper text.
     Left: publication name + tagline. Right: footer navigation.
     Bottom row: copyright + attribution in plex-mono. -->

<!-- wp:group {"tagName":"footer","className":"gutter-site-footer gutter-band--terminal","style":{"spacing":{"padding":{"top":"var:preset|spacing|12","bottom":"var:preset|spacing|10","left":"var:preset|spacing|5","right":"var:preset|spacing|5"}}},"layout":{"type":"constrained","contentSize":"1360px"}} -->
<footer class="wp-block-group gutter-site-footer gutter-band--terminal" style="padding-top:var(--wp--preset--spacing--12);padding-bottom:var(--wp--preset--spacing--10);padding-left:var(--wp--preset--spacing--5);padding-right:var(--wp--preset--spacing--5)">

	<!-- Top row: name + nav -->
	<!-- wp:group {"layout":{"type":"flex","flexWrap":"wrap","justifyContent":"space-between","verticalAlignment":"center"},"style":{"spacing":{"blockGap":"var:preset|spacing|8"}}} -->
	<div class="wp-block-group">

		<!-- Publication name and tagline -->
		<!-- wp:group {"layout":{"type":"default"},"style":{"spacing":{"blockGap":"var:preset|spacing|2"}}} -->
		<div class="wp-block-group">
			<!-- wp:site-title {"level":0,"isLink":true,"style":{"typography":{"fontFamily":"var:preset|font-family|plex-serif","fontWeight":"300","fontSize":"var:preset|font-size|xl","letterSpacing":"-0.01em","textDecoration":"none"},"color":{"text":"var:preset|color|paper"}}} /-->
			<!-- wp:site-tagline {"style":{"typography":{"fontFamily":"var:preset|font-family|plex-sans","fontSize":"var:preset|font-size|2xs","letterSpacing":"0.1em","textTransform":"uppercase"},"color":{"text":"var:preset|color|ink-faint"}}} /-->
		</div>
		<!-- /wp:group -->

		<!-- Footer navigation -->
		<!-- wp:navigation {"textColor":"paper","style":{"typography":{"fontFamily":"var:preset|font-family|plex-sans","fontSize":"var:preset|font-size|sm","letterSpacing":"0.02em"}},"layout":{"type":"flex","justifyContent":"right"}} /-->

	</div>
	<!-- /wp:group -->

	<!-- Separator -->
	<!-- wp:separator {"style":{"spacing":{"margin":{"top":"var:preset|spacing|10","bottom":"var:preset|spacing|6"}},"color":{"background":"rgba(255,255,255,0.1)"}}} -->
	<hr class="wp-block-separator has-alpha-channel-opacity has-background" style="margin-top:var(--wp--preset--spacing--10);margin-bottom:var(--wp--preset--spacing--6);background-color:rgba(255,255,255,0.1)" />
	<!-- /wp:separator -->

	<!-- Copyright row in plex-mono -->
	<!-- wp:group {"layout":{"type":"flex","flexWrap":"wrap","justifyContent":"space-between"},"style":{"spacing":{"blockGap":"var:preset|spacing|4"}}} -->
	<div class="wp-block-group">
		<!-- Copyright line bound to the gutter/copyright source (WP 6.5+ block
		     bindings, registered in inc/bindings.php). The callback composes the
		     translatable "© {year} {site}. All rights reserved." sentence so the
		     year stays live and the string is never hardcoded in this template. -->
		<!-- wp:paragraph {"metadata":{"bindings":{"content":{"source":"gutter/copyright"}}},"style":{"typography":{"fontFamily":"var:preset|font-family|plex-mono","fontSize":"var:preset|font-size|2xs","letterSpacing":"0.04em"},"color":{"text":"var:preset|color|ink-faint"}}} -->
		<p class="has-text-color" style="font-family:var(--wp--preset--font-family--plex-mono);font-size:var(--wp--preset--font-size--2xs);letter-spacing:0.04em;color:var(--wp--preset--color--ink-faint)"></p>
		<!-- /wp:paragraph -->
		<!-- Credit line bound to the gutter/footer-credit source. The callback
		     reads the theme's own Name and Theme URI from style.css, so no theme
		     name is hardcoded here, and an integrator can rewrite or remove the
		     credit through the gutter/footer_credit filter without a template edit. -->
		<!-- wp:paragraph {"metadata":{"bindings":{"content":{"source":"gutter/footer-credit"}}},"style":{"typography":{"fontFamily":"var:preset|font-family|plex-mono","fontSize":"var:preset|font-size|2xs","letterSpacing":"0.04em"},"color":{"text":"var:preset|color|ink-faint"}}} -->
		<p class="has-text-color" style="font-family:var(--wp--preset--font-family--plex-mono);font-size:var(--wp--preset--font-size--2xs);letter-spacing:0.04em;color:var(--wp--preset--color--ink-faint)"></p>
		<!-- /wp:paragraph -->
	</div>
	<!-- /wp:group -->

</footer>
<!-- /wp:group -->
